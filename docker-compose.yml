# E2EE Chat - Docker Compose 配置
# 部署域名: https://yb.yzs88.com
# 复用服务器上已有的 yzs-mysql / yzs-redis 容器

services:
  backend:
    image: e2eechat-backend:latest
    pull_policy: never
    restart: always
    environment:
      CONFIG: /app/config.yaml
      # 版本信息：每次发版时同步修改前端 package.json 的 version 与这里的 APP_LATEST_VERSION
      APP_LATEST_VERSION: "1.0.0"   # 线上最新版本号
      APP_MIN_VERSION: "1.0.0"      # 低于此版本强制更新（可留空）
      APP_UPDATE_URL: "https://yb.yzs88.com"  # 更新/下载地址
      APP_VERSION_NOTES: ""         # 更新说明（可留空）
    volumes:
      - ./config.prod.yaml:/app/config.yaml:ro
    networks:
      - default
      - e2eechat-net

  frontend:
    image: e2eechat-frontend:latest
    pull_policy: never
    restart: always
    depends_on:
      - backend
    volumes:
      - /usr/share/nginx/html/download:/usr/share/nginx/html/download:ro

networks:
  default: {}
  e2eechat-net:
    external: true