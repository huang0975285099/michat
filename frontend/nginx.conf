server {
    listen 80;
    server_name yb.yzs88.com;

    root  /usr/share/nginx/html;
    index index.html;

    # 纵深防御：即使绕过边缘 nginx 直连本容器，也限制慢速攻击与超大请求体
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          15s;
    client_max_body_size  2m;

    # 安装包下载（静态文件，不走 SPA 路由）
    location /download/ {
        alias /usr/share/nginx/html/download/;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
    }

    # 哈希命名的静态资源（JS/CSS）：文件名随内容变化，可长期强缓存
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 前端 SPA 路由
    # index.html 与 Service Worker 等根目录文件不缓存（每次向服务器校验），
    # 确保发版后用户无需手动强刷即可拿到引用新资源哈希的最新 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API 反向代理
    # X-Real-IP / X-Forwarded-For 透传边缘 nginx 已写入的真实客户端 IP
    # （不要用 $remote_addr 覆盖，否则后端拿到的是边缘 nginx 的 IP）。
    location /api/ {
        proxy_pass         http://backend:8888;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $http_x_real_ip;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass         http://backend:8888;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $http_x_real_ip;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
