# yb.yzs88.com - E2EE Chat
# 由 load.sh 自动注入到 yzs-nginx 容器

server {
    listen 80;
    listen [::]:80;
    server_name yb.yzs88.com;
    return 301 https://yb.yzs88.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yb.yzs88.com;

    ssl_certificate     /etc/nginx/ssl/yb.yzs88.com.pem;
    ssl_certificate_key /etc/nginx/ssl/yb.yzs88.com.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $frontend e2eechat-frontend-1:80;
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws {
        set $frontend e2eechat-frontend-1:80;
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
