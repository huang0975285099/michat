# yb.yzs88.com - E2EE Chat
# 由 load.sh 自动注入到 yzs-nginx 容器

# ── 抗 DDoS / 滥用限流（边缘层，$binary_remote_addr 为真实客户端 IP）──
# 注：这些 *_zone 指令位于 http{} 上下文（本文件被 include 进 http{}）。
# 阈值按“手机为主 + 运营商 CGNAT”放宽：大量真实用户会共用一个出口 IP，
# 故按 IP 的限制只作单机异常洪水的兜底，精细管控交给后端按用户/按连接的限流。
# 若监控发现 429 误伤正常用户，继续上调这三项。
#   - api_req：普通 API 100 r/s，突发 200
#   - ws_req ：WS 建连 30 r/s，突发 60
#   - perip_conn：单 IP 并发连接上限（含长连 WS）500
limit_req_zone  $binary_remote_addr zone=api_req:10m  rate=100r/s;
limit_req_zone  $binary_remote_addr zone=ws_req:10m   rate=30r/s;
limit_conn_zone $binary_remote_addr zone=perip_conn:10m;
limit_req_status  429;
limit_conn_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name yb.yzs88.com;
    return 301 https://yb.yzs88.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yb.yzs88.com;

    ssl_certificate     /etc/nginx/ssl/yb.yzs88.com.pem;
    ssl_certificate_key /etc/nginx/ssl/yb.yzs88.com.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── 慢速攻击（Slowloris）防护 + 请求体上限 ──
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          15s;
    client_max_body_size  2m;

    # 单 IP 并发连接上限（CGNAT 下众多手机用户共用出口 IP，放宽到 500 作兜底）
    limit_conn perip_conn 500;

    location / {
        set $frontend e2eechat-frontend-1:80;
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # 重置 XFF 为真实客户端 IP，丢弃客户端伪造的 X-Forwarded-For，
        # 使后端 ClientIP 取到的首位即为可信真实 IP（按 IP 限流依赖于此）。
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API：100 r/s（突发 200），挡接口刷量
    location /api/ {
        set $frontend e2eechat-frontend-1:80;
        limit_req zone=api_req burst=200 nodelay;
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket：建连 30 r/s（突发 60），挡半开连接洪水
    location /ws {
        set $frontend e2eechat-frontend-1:80;
        limit_req zone=ws_req burst=60 nodelay;
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_read_timeout 86400;
    }
}
